syntax = "proto3";

// Based on TASK-26-tool-schemas.md and TASK-110-tool-enum-mapping.md

message AvailableModelsResponse { 
  message AvailableModel {
    string name = 1;
    bool defaultOn = 2;
    optional bool isLongContextOnly = 3;
    optional bool isChatOnly = 4;
  }
  repeated AvailableModel models = 2;
  repeated string modelNames = 1;
}

// ClientSideToolV2 enum - from cursor_agent_client.py (2.6.22)
enum ClientSideToolV2 {
  CLIENT_SIDE_TOOL_V2_UNSPECIFIED = 0;
  CLIENT_SIDE_TOOL_V2_READ_SEMSEARCH_FILES = 1;
  CLIENT_SIDE_TOOL_V2_RIPGREP_SEARCH = 3;
  CLIENT_SIDE_TOOL_V2_READ_FILE = 5;
  CLIENT_SIDE_TOOL_V2_LIST_DIR = 6;
  CLIENT_SIDE_TOOL_V2_EDIT_FILE = 7;
  CLIENT_SIDE_TOOL_V2_FILE_SEARCH = 8;
  CLIENT_SIDE_TOOL_V2_SEMANTIC_SEARCH_FULL = 9;
  CLIENT_SIDE_TOOL_V2_DELETE_FILE = 11;
  CLIENT_SIDE_TOOL_V2_REAPPLY = 12;
  CLIENT_SIDE_TOOL_V2_RUN_TERMINAL_COMMAND_V2 = 15;
  CLIENT_SIDE_TOOL_V2_FETCH_RULES = 16;
  CLIENT_SIDE_TOOL_V2_WEB_SEARCH = 18;
  CLIENT_SIDE_TOOL_V2_MCP = 19;
  CLIENT_SIDE_TOOL_V2_SEARCH_SYMBOLS = 23;
  CLIENT_SIDE_TOOL_V2_BACKGROUND_COMPOSER_FOLLOWUP = 24;
  CLIENT_SIDE_TOOL_V2_KNOWLEDGE_BASE = 25;
  CLIENT_SIDE_TOOL_V2_FETCH_PULL_REQUEST = 26;
  CLIENT_SIDE_TOOL_V2_DEEP_SEARCH = 27;
  CLIENT_SIDE_TOOL_V2_CREATE_DIAGRAM = 28;
  CLIENT_SIDE_TOOL_V2_FIX_LINTS = 29;
  CLIENT_SIDE_TOOL_V2_READ_LINTS = 30;
  CLIENT_SIDE_TOOL_V2_GO_TO_DEFINITION = 31;
  CLIENT_SIDE_TOOL_V2_TASK = 32;
  CLIENT_SIDE_TOOL_V2_AWAIT_TASK = 33;
  CLIENT_SIDE_TOOL_V2_TODO_READ = 34;
  CLIENT_SIDE_TOOL_V2_TODO_WRITE = 35;
  CLIENT_SIDE_TOOL_V2_EDIT_FILE_V2 = 38;
  CLIENT_SIDE_TOOL_V2_LIST_DIR_V2 = 39;
  CLIENT_SIDE_TOOL_V2_READ_FILE_V2 = 40;
  CLIENT_SIDE_TOOL_V2_RIPGREP_RAW_SEARCH = 41;
  CLIENT_SIDE_TOOL_V2_GLOB_FILE_SEARCH = 42;
  CLIENT_SIDE_TOOL_V2_CREATE_PLAN = 43;
  CLIENT_SIDE_TOOL_V2_LIST_MCP_RESOURCES = 44;
  CLIENT_SIDE_TOOL_V2_READ_MCP_RESOURCE = 45;
  CLIENT_SIDE_TOOL_V2_READ_PROJECT = 46;
  CLIENT_SIDE_TOOL_V2_UPDATE_PROJECT = 47;
  CLIENT_SIDE_TOOL_V2_TASK_V2 = 48;
  CLIENT_SIDE_TOOL_V2_CALL_MCP_TOOL = 49;
  CLIENT_SIDE_TOOL_V2_APPLY_AGENT_DIFF = 50;
  CLIENT_SIDE_TOOL_V2_ASK_QUESTION = 51;
  CLIENT_SIDE_TOOL_V2_SWITCH_MODE = 52;
  CLIENT_SIDE_TOOL_V2_GENERATE_IMAGE = 53;
  CLIENT_SIDE_TOOL_V2_COMPUTER_USE = 54;
  CLIENT_SIDE_TOOL_V2_WRITE_SHELL_STDIN = 55;
  CLIENT_SIDE_TOOL_V2_GET_MCP_TOOLS = 63;
}

// Tool call from server - see TASK-26-tool-schemas.md ClientSideToolV2Call
message ClientSideToolV2Call {
  ClientSideToolV2 tool = 1;
  string tool_call_id = 3;
  string name = 9;
  string raw_args = 10;
  // params oneof fields omitted for simplicity - use raw_args JSON
}

// Tool result sent back to server - see TASK-26-tool-schemas.md ClientSideToolV2Result
message ClientSideToolV2Result {
  ClientSideToolV2 tool = 1;
  string tool_call_id = 35;
  // result oneof - we'll encode specific results inline
}

message MessageSummary {
  string content = 1;
  string summaryId1 = 2; 
  string summaryId2 = 3; // uuid, equal to summaryId1
  string previousSummaryId = 4; 
}

message MessageThinking {
  string content = 1;
}
message StreamUnifiedChatWithToolsRequest {
  message Request {
    message Message {
      message Image {
        message Metadata {
          int32 width = 1;
          int32 height = 2;
        }
        bytes data = 1;
        Metadata metadata = 2;
      }
      string content = 1;
      int32 role = 2;
      Image image = 10;
      string messageId = 13;
      string unknown29 = 29; // 1, only for user message
      string summaryId = 32;
      MessageSummary summary = 39;
      MessageThinking thinking = 45;
      int32 chatModeEnum = 47; // 1 for ask, 2 for agent, 3 for edit
    }
    message Instruction {
      string instruction = 1;
    }
    message Model {
      string name = 1;
      bytes empty = 4;
    }
    message CursorSetting {
      message Unknown6 {
        bytes unknown1 = 1;
        bytes unknown2 = 2;
      }
      string name = 1;
      bytes unknown3 = 3;
      Unknown6 unknown6 = 6;
      int32 unknown8 = 8;
      int32 unknown9 = 9;
    }
    message Metadata {
      string os = 1; // win32
      string arch = 2; // x64
      string version = 3; // 10.0.22631
      string path = 4; // C:\Program Files\PowerShell\7\pwsh.exe
      string timestamp = 5; // 2025-03-03T13:10:08.590Z
    }
    message MessageId {
      string messageId = 1;
      string summaryId = 2;
      int32 role = 3;
    }

    repeated Message messages = 1;
    int32 unknown2 = 2; // 1
    Instruction instruction = 3;
    int32 unknown4 = 4; // 1
    Model model = 5;
    repeated string wikiTool = 7; // one url one item
    string webTool = 8; // "full search"
    int32 unknown13 = 13;
    CursorSetting cursorSetting = 15;
    int32 unknown19 = 19; // 1
    int32 unknown22 = 22; // 1
    string conversationId = 23; // uuid
    Metadata metadata = 26;
    bool isAgentic = 27; // true for agent mode - see TASK-7-protobuf-schemas.md
    repeated ClientSideToolV2 supportedTools = 29; // Agent mode tools - see TASK-7
    repeated MessageId messageIds = 30;
    int32 largeContext = 35; // 1
    int32 unknown38 = 38; // 0
    int32 chatModeEnum = 46; // 1=Ask, 3=Agent (request-level)
    string unknown47 = 47;
    int32 unknown48 = 48; // 0
    int32 unknown49 = 49; // 0
    int32 unknown51 = 51; // 0
    int32 unknown53 = 53; // 1
    string chatMode = 54; // "Ask" or "Agent"
  }
  
  Request request = 1;
}

// Inner response - from cursor-grpc/server_full.proto
message StreamUnifiedChatResponse {
  string text = 1;
  optional string debugging_only_chat_prompt = 2;
  optional int32 debugging_only_token_count = 3;
  optional string filled_prompt = 5;
  optional string intermediate_text = 7;
  optional string server_bubble_id = 22;

  message Thinking {
    string content = 1;
  }
  optional Thinking thinking = 25;

  // Legacy tool call at field 13
  message ToolCallV1 {
    string tool_call_id = 1;
    string name = 2;
    string arguments = 3;
  }
  optional ToolCallV1 tool_call = 13;

  optional string usage_uuid = 27;
}

// Wrapper response - from cursor-grpc/server_full.proto
// oneof: tool call at field 1, chat response at field 2, summary at field 3
message StreamUnifiedChatWithToolsResponse {
  // Tool call from server
  message ToolCallV2 {
    ClientSideToolV2 tool = 1;
    string tool_call_id = 3;
    string name = 9;
    string raw_args = 10;
  }

  ToolCallV2 client_side_tool_v2_call = 1;
  StreamUnifiedChatResponse stream_unified_chat_response = 2;
  // ConversationSummary at field 3 - omitted for now
}
